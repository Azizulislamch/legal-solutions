<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Solutions</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="bg-white border-b border-gray-100 max-w-7xl mx-auto my-2 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <img src="assets/images/business.png" alt="" class="w-10 h-10 cursor-pointer">
                <span class="text-[35px] font-garamond font-bold text-gray-800 cursor-pointer">Justice</span>
            </div>

            <div class="hidden md:flex items-center space-x-8 text-gray-600 font-medium">
                <a href="#" class="hover:text-[#B49164] transition">Home</a>

                <a href="#" class="flex items-center hover:text-[#B49164] transition font-poppins">
                    Services
                    <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </a>

                <a href="#" class="flex items-center hover:text-[#B49164] transition font-poppins">
                    Cases
                    <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </a>

                <a href="#" class="flex items-center hover:text-[#B49164] transition font-poppins">
                    Blog
                    <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </a>

                <a href="#" class="flex items-center hover:text-[#B49164] transition font-poppins">
                    Contact Us
                    <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </a>
            </div>

            <div>
                <a href="#"
                    class="bg-[#B49164] hover:bg-[#926e41] text-white px-8 py-3 font-poppins rounded-md font-semibold transition duration-300">
                    Free Consultation
                </a>
            </div>
        </nav>

        <section class="max-w-7xl mx-auto relative rounded-xl overflow-hidden h-[550px] mt-2">
            <div class="absolute inset-0">
                <img src="assets/images/banner.png" alt="Hero Banner" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-b from-black/60 to-black/90"></div>
            </div>

            <div class="relative h-full flex flex-col items-center justify-center text-center px-4">
                <h1 class="font-garamond text-white text-5xl md:text-[70px] font-bold leading-tight mb-4">
                    We Provide Effective <br> Legal Solutions
                </h1>

                <p class="max-w-2xl text-gray-300 text-base md:text-lg mb-10 leading-relaxed">
                    Our team of experienced attorneys is dedicated to protecting your rights and providing
                    expert legal guidance through the most complex judicial landscapes.
                </p>

                <div class="w-full max-w-2xl flex flex-col md:flex-row items-stretch gap-4 justify-center">
                    <input type="text" placeholder="Search your services"
                        class="flex-1 bg-white px-6 py-4 rounded-lg focus:outline-none text-gray-700 shadow-lg" />
                    <button
                        class="bg-[#B49164] hover:bg-[#926c3e] text-white px-10 py-4 rounded-lg font-bold text-lg transition duration-300 shadow-lg">
                        Search
                    </button>
                </div>
            </div>
        </section>
    </header>

    <main>

    </main>

    <footer>

    </footer>
</body>

</html>
